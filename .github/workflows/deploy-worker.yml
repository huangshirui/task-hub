name: Deploy Worker

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-worker.yml"
      - "src/worker/**"
      - "tests/worker/**"
      - "cloudflare/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Generate Wrangler config
        shell: bash
        run: |
          cat > wrangler.toml <<'EOF'
          name = "${{ vars.CF_WORKER_NAME }}"
          main = "src/worker/index.ts"
          compatibility_date = "${{ vars.CF_COMPATIBILITY_DATE }}"

          [[queues.producers]]
          queue = "${{ vars.CF_QUEUE_NAME }}"
          binding = "TASK_SUBMISSIONS"

          [[queues.consumers]]
          queue = "${{ vars.CF_QUEUE_NAME }}"

          [[d1_databases]]
          binding = "TASK_DB"
          database_name = "${{ vars.CF_D1_DATABASE_NAME }}"
          database_id = "${{ vars.CF_D1_DATABASE_ID }}"
          migrations_dir = "cloudflare/migrations"

          [[r2_buckets]]
          binding = "TASK_OBJECTS"
          bucket_name = "${{ vars.CF_R2_BUCKET_NAME }}"

          [[durable_objects.bindings]]
          name = "RUNNER_HUB"
          class_name = "RunnerHub"

          [[migrations]]
          tag = "v1"
          new_sqlite_classes = ["RunnerHub"]
          EOF

      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply ${{ vars.CF_D1_DATABASE_NAME }} --remote

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          secrets: |
            WEBHOOK_SECRET
            RUNNER_REGISTRATION_TOKEN
            TASK_HUB_ADMIN_TOKEN
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          RUNNER_REGISTRATION_TOKEN: ${{ secrets.RUNNER_REGISTRATION_TOKEN }}
          TASK_HUB_ADMIN_TOKEN: ${{ secrets.TASK_HUB_ADMIN_TOKEN }}
